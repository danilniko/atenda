<!doctype html><html lang="pt-PT"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--carbon:#181925;--iris:#9580ff;--lavender:#918df6;--mint:#33c758;--mint-wash:#def6e4;--ash:#8a8a97;--fog:#ececf2;--paper:#fff;--linen:#f6f6fa}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{width:1080px;height:1080px}
body{font-family:'Inter',-apple-system,'Helvetica Neue',Arial,sans-serif;background:radial-gradient(120% 100% at 50% 0%,#f3f1ff 0%,#fafafe 45%,#f6f6fa 100%);color:var(--carbon);letter-spacing:-.02em;position:relative;overflow:hidden}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;padding:74px 72px 66px}
.brand{display:flex;align-items:center;gap:14px;font-weight:800;font-size:34px}
.logo{width:56px;height:56px;border-radius:15px;background:var(--iris);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(149,128,255,.35)}
.logo svg{display:block}
.tag{margin-left:auto;font-size:20px;font-weight:700;color:var(--iris);background:#efeaff;padding:11px 20px;border-radius:999px;letter-spacing:.02em}
h1{font-size:74px;line-height:1.02;font-weight:800;margin-top:52px;letter-spacing:-.035em}
h1 .hl{background:var(--mint-wash);color:#1f8f3d;padding:0 14px;border-radius:12px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.phone{margin:52px auto 0;width:560px;background:#fff;border-radius:40px;box-shadow:0 30px 70px rgba(24,25,37,.18),0 0 0 1px rgba(24,25,37,.05);padding:26px 26px 30px;position:relative}
.pbar{display:flex;align-items:center;gap:14px;padding:6px 6px 22px;border-bottom:1px solid var(--fog)}
.pav{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#25d366,#128c7e);display:flex;align-items:center;justify-content:center;color:#fff}
.pname{font-weight:700;font-size:26px}
.pstat{font-size:18px;color:var(--mint);font-weight:600}
.chat{padding:26px 4px 4px;display:flex;flex-direction:column;gap:18px}
.b{max-width:82%;padding:18px 22px;font-size:25px;line-height:1.32;border-radius:22px}
.bin{align-self:flex-start;background:var(--linen);border-bottom-left-radius:7px}
.bout{align-self:flex-end;background:#dcf8c6;border-bottom-right-radius:7px}
.t{display:block;font-size:16px;color:var(--ash);margin-top:7px;font-weight:500}
.tick{color:#34b7f1;font-weight:700}
.booked{align-self:flex-end;display:flex;align-items:center;gap:10px;background:var(--iris);color:#fff;font-weight:700;font-size:22px;padding:15px 22px;border-radius:16px;box-shadow:0 10px 24px rgba(149,128,255,.4)}
.foot{margin-top:auto;display:flex;align-items:center;gap:20px;padding-top:30px}
.foot b{font-size:27px;font-weight:800}
.foot .sub{font-size:22px;color:var(--ash);font-weight:600;line-height:1.3}
.price{margin-left:auto;font-size:30px;font-weight:800;color:var(--iris);white-space:nowrap}
</style></head>
<body><div class="wrap">
  <div class="brand">
    <span class="logo"><svg width="34" height="34" viewBox="0 0 64 64"><rect x="10" y="11" width="33" height="24" rx="9.5" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/><rect x="23" y="29" width="31" height="21" rx="9.5" fill="#fff"/><circle cx="33" cy="39.5" r="2.4" fill="#9580ff"/><circle cx="39" cy="39.5" r="2.4" fill="#9580ff"/><circle cx="45" cy="39.5" r="2.4" fill="#9580ff"/></svg></span>
    Atenda
    <span class="tag">24/7</span>
  </div>
  <h1>Nenhum cliente<br><span class="hl">perdido.</span></h1>
  <div class="phone">
    <div class="pbar"><span class="pav"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span><div><div class="pname">Cliente novo</div><div class="pstat">online</div></div></div>
    <div class="chat">
      <div class="b bin">Boas! Tens vaga para corte no sábado de manhã?<span class="t">22:47</span></div>
      <div class="b bout">Olá! Tenho sim 🙌 sábado às 11h00. Fica marcado em seu nome?<span class="t">22:47 <span class="tick">✓✓</span></span></div>
      <div class="b bin">Perfeito! Sou a Ana<span class="t">22:48</span></div>
      <div class="booked">✓ Marcada · Sábado 11h00</div>
    </div>
  </div>
  <div class="foot">
    <div><b>Responde e marca sozinha.</b><div class="sub">WhatsApp · Instagram · Chamadas</div></div>
    <div class="price">€89/mês</div>
  </div>
</div></body></html>
