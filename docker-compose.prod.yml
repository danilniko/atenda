services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atenda-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-atenda}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    expose:
      - "3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - atenda_net

  mongodb:
    image: mongo:7
    container_name: atenda-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-atenda}
    volumes:
      - mongodb_prod_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atenda_net

  nginx:
    image: nginx:1.27-alpine
    container_name: atenda-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - atenda_net

networks:
  atenda_net:
    driver: bridge

volumes:
  mongodb_prod_data:
