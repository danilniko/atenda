services:
  mongodb:
    image: mongo:7
    container_name: atenda-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-atenda}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-atenda}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-atenda}
    volumes:
      - mongodb_dev_data:/data/db

volumes:
  mongodb_dev_data:
